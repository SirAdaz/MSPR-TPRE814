services:
  postgres-ec:
    image: postgres:16
    environment:
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: futurekawa
      POSTGRES_DB: futurekawa_ec

  mosquitto-ec:
    image: eclipse-mosquitto:2

  backend-ec:
    build: ./backend
    environment:
      COUNTRY_CODE: EC
      ENABLE_SCHEDULER: "true"
      ENABLE_MQTT: "true"
      DATABASE_URL: postgresql://futurekawa:futurekawa@postgres-ec:5432/futurekawa_ec
      MQTT_HOST: mosquitto-ec
      MQTT_PORT: 1883
      ALERT_EMAIL_TO: ecuador.ops@futurekawa.local
    depends_on:
      - postgres-ec
      - mosquitto-ec
    ports:
      - "8002:8000"

  postgres-co:
    image: postgres:16
    environment:
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: futurekawa
      POSTGRES_DB: futurekawa_co

  mosquitto-co:
    image: eclipse-mosquitto:2

  backend-co:
    build: ./backend
    environment:
      COUNTRY_CODE: CO
      ENABLE_SCHEDULER: "true"
      ENABLE_MQTT: "true"
      DATABASE_URL: postgresql://futurekawa:futurekawa@postgres-co:5432/futurekawa_co
      MQTT_HOST: mosquitto-co
      MQTT_PORT: 1883
      ALERT_EMAIL_TO: colombia.ops@futurekawa.local
    depends_on:
      - postgres-co
      - mosquitto-co
    ports:
      - "8003:8000"
