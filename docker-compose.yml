services:
  postgres-br:
    image: postgres:16
    environment:
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: futurekawa
      POSTGRES_DB: futurekawa_br
    ports:
      - "5433:5432"

  mosquitto-br:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"

  backend-br:
    build: ./backend
    environment:
      COUNTRY_CODE: BR
      ENABLE_SCHEDULER: "true"
      ENABLE_MQTT: "true"
      DATABASE_URL: postgresql://futurekawa:futurekawa@postgres-br:5432/futurekawa_br
      MQTT_HOST: mosquitto-br
      MQTT_PORT: 1883
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      ALERT_EMAIL_TO: brazil.ops@futurekawa.local
    depends_on:
      - postgres-br
      - mosquitto-br
    ports:
      - "8001:8000"

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  frontend:
    build: ./frontend
    environment:
      BACKEND_BR_URL: http://backend-br:8000
      BACKEND_EC_URL: http://backend-ec:8000
      BACKEND_CO_URL: http://backend-co:8000
    depends_on:
      - backend-br
    ports:
      - "3000:3000"
