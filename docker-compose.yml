services:
  postgres-br:
    image: postgres:16
    environment:
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: futurekawa
      POSTGRES_DB: futurekawa_br
    ports:
      - "5433:5432"

  mosquitto-br:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"

  backend-br:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      COUNTRY_CODE: BR
      ENABLE_SCHEDULER: "false"
      ENABLE_MQTT: "false"
      DATABASE_URL: postgresql://futurekawa:futurekawa@postgres-br:5432/futurekawa_br
      FRONTEND_API_KEY: front-dev-key
      SENSOR_API_KEY: sensor-dev-key
      MQTT_HOST: mosquitto-br
      MQTT_PORT: 1883
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      ALERT_EMAIL_TO: brazil.ops@futurekawa.local
    depends_on:
      - postgres-br
      - mosquitto-br
    ports:
      - "8001:8000"

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  frontend:
    image: node:20
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      BACKEND_BR_URL: http://backend-br:8000
      BACKEND_EC_URL: http://backend-br:8000
      BACKEND_CO_URL: http://backend-br:8000
      FRONTEND_API_KEY: front-dev-key
      AUTH_DATABASE_URL: postgresql://futurekawa:futurekawa@postgres-br:5432/futurekawa_br
      BETTER_AUTH_SECRET: dev-better-auth-secret-32-characters-minimum!
      BETTER_AUTH_URL: http://localhost:3000
      DEFAULT_ADMIN_EMAIL: admin@futurekawa.local
    depends_on:
      - backend-br
    ports:
      - "3000:3000"
