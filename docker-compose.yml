services:
  postgres-auth:
    image: postgres:16
    environment:
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: futurekawa
      POSTGRES_DB: futurekawa_auth
    ports:
      - "5434:5432"

  postgres-br:
    image: postgres:16
    environment:
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: futurekawa
      POSTGRES_DB: futurekawa_br
    ports:
      - "5433:5432"

  postgres-ec:
    image: postgres:16
    environment:
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: futurekawa
      POSTGRES_DB: futurekawa_ec
    ports:
      - "5435:5432"

  postgres-co:
    image: postgres:16
    environment:
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: futurekawa
      POSTGRES_DB: futurekawa_co
    ports:
      - "5436:5432"

  mosquitto-br:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"

  mosquitto-ec:
    image: eclipse-mosquitto:2
    ports:
      - "1884:1883"

  mosquitto-co:
    image: eclipse-mosquitto:2
    ports:
      - "1885:1883"

  backend-br:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      COUNTRY_CODE: BR
      ENABLE_SCHEDULER: "false"
      ENABLE_MQTT: "false"
      DATABASE_URL: postgresql://futurekawa:futurekawa@postgres-br:5432/futurekawa_br
      FRONTEND_API_KEY: front-dev-key
      SENSOR_API_KEY: sensor-dev-key
      MQTT_HOST: mosquitto-br
      MQTT_PORT: 1883
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      ALERT_EMAIL_TO: brazil.ops@futurekawa.local
    depends_on:
      - postgres-br
      - mosquitto-br
    ports:
      - "8001:8000"

  backend-ec:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      COUNTRY_CODE: EC
      ENABLE_SCHEDULER: "false"
      ENABLE_MQTT: "false"
      DATABASE_URL: postgresql://futurekawa:futurekawa@postgres-ec:5432/futurekawa_ec
      FRONTEND_API_KEY: front-dev-key
      SENSOR_API_KEY: sensor-dev-key
      MQTT_HOST: mosquitto-ec
      MQTT_PORT: 1883
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      ALERT_EMAIL_TO: ecuador.ops@futurekawa.local
    depends_on:
      - postgres-ec
      - mosquitto-ec
    ports:
      - "8002:8000"

  backend-co:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      COUNTRY_CODE: CO
      ENABLE_SCHEDULER: "false"
      ENABLE_MQTT: "false"
      DATABASE_URL: postgresql://futurekawa:futurekawa@postgres-co:5432/futurekawa_co
      FRONTEND_API_KEY: front-dev-key
      SENSOR_API_KEY: sensor-dev-key
      MQTT_HOST: mosquitto-co
      MQTT_PORT: 1883
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      ALERT_EMAIL_TO: colombia.ops@futurekawa.local
    depends_on:
      - postgres-co
      - mosquitto-co
    ports:
      - "8003:8000"

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  frontend:
    image: node:20
    command: sh -c "npm install && until npx prisma migrate deploy; do echo 'Waiting for auth database...' && sleep 2; done && npx prisma generate && npm run dev -- --hostname 0.0.0.0 --port 3000 & NEXT_PID=$$! && node ./scripts/init-admin-user.mjs && wait $$NEXT_PID"
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      BACKEND_BR_URL: http://backend-br:8000
      BACKEND_EC_URL: http://backend-ec:8000
      BACKEND_CO_URL: http://backend-co:8000
      FRONTEND_API_KEY: front-dev-key
      AUTH_DATABASE_URL: postgresql://futurekawa:futurekawa@postgres-auth:5432/futurekawa_auth
      BETTER_AUTH_SECRET: dev-better-auth-secret-32-characters-minimum!
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_URL_INTERNAL: http://127.0.0.1:3000
      DEFAULT_ADMIN_EMAIL: admin@futurekawa.local
      DEFAULT_ADMIN_PASSWORD: Admin123!
    depends_on:
      - postgres-auth
      - backend-br
      - backend-ec
      - backend-co
    ports:
      - "3000:3000"
